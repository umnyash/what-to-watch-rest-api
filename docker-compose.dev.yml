services:
  db:
    image: mongo:4.2
    restart: unless-stopped
    container_name: what-to-watch_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - ${DB_PORT}:27017
    volumes:
      - what-to-watch_data:/data/db

  db_ui:
    image: mongo-express:1.0.2-20
    restart: unless-stopped
    container_name: what-to-watch_mongo-express
    ports:
      - ${DB_UI_PORT:-8081}:8081
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: ${DB_USERNAME}
      ME_CONFIG_BASICAUTH_PASSWORD: ${DB_PASSWORD}
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${DB_USERNAME}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${DB_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${DB_USERNAME}:${DB_PASSWORD}@db:27017/

volumes:
  what-to-watch_data:
